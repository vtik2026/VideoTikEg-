<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Vtik Quick Upload</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 50px; }
        .box { border: 2px dashed #444; padding: 40px; border-radius: 20px; }
        #msg { margin-top: 20px; color: #fe2c55; }
    </style>
</head>
<body>
    <div class="box">
        <h2>ارفع فيديو (5 ثواني)</h2>
        <input type="file" id="up" accept="video/*">
        <div id="msg"></div>
    </div>

    <script>
        document.getElementById('up').onchange = async function() {
            const file = this.files[0];
            if(!file) return;

            const msg = document.getElementById('msg');
            msg.innerText = "⏳ جاري الرفع... لا تغلق الصفحة";

            const fd = new FormData();
            fd.append('video', file); // تأكد أن الاسم مطابق لما في البايثون

            try {
                const res = await fetch("https://Vtikeg.pythonanywhere.com/api/upload-from-web", {
                    method: "POST",
                    body: fd
                });
                const data = await res.json();
                if(res.ok) {
                    msg.innerText = "✅ نجح الإرسال لتليجرام!";
                    alert("تم الرفع بنجاح");
                } else {
                    msg.innerText = "❌ خطأ: " + (data.error || "فشل السيرفر");
                }
            } catch(e) {
                msg.innerText = "❌ تعذر الاتصال بالسيرفر";
            }
        };
    </script>
</body>
</html>
