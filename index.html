<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik Audio | منصة الصوت</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        .audio-card { background: #1a1a1a; margin: 15px; padding: 20px; border-radius: 15px; border-left: 5px solid #fe2c55; }
        audio { width: 100%; margin-top: 10px; height: 35px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; height: 60px; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #888; }
        .nav-item.active { color: #fe2c55; font-weight: bold; }
        .btn-upload { background: #fe2c55; color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        .page { display: none; padding: 20px; }
        .active-page { display: block; }
    </style>
</head>
<body>

    <div id="homePage" class="page active-page">
        <h2>🎧 المقاطع الصوتية</h2>
        <div id="audioList">جاري التحميل...</div>
    </div>

    <div id="uploadPage" class="page">
        <h2>⬆️ رفع ملف صوتي</h2>
        <div style="border: 2px dashed #444; padding: 40px; border-radius: 20px;">
            <input type="file" id="audioFile" accept="audio/*" style="display:none" onchange="updateFileName()">
            <button class="btn-upload" onclick="document.getElementById('audioFile').click()">اختر ملف MP3</button>
            <p id="fileName" style="color: #888; margin-top: 10px;">لم يتم اختيار ملف</p>
            <br>
            <button id="sendBtn" class="btn-upload" style="background:#25d366; display:none" onclick="uploadAudio()">نشر الآن 🚀</button>
        </div>
        <p id="status"></p>
    </div>

    <nav class="nav">
        <div class="nav-item active" id="navHome" onclick="showPage('homePage')">🏠 الرئيسية</div>
        <div class="nav-item" id="navUpload" onclick="showPage('uploadPage')">➕ رفع صوت</div>
    </nav>

    <script>
        const SB_URL = "https://filnjwkcbfcdbkajqwji.supabase.co";
        const SB_KEY = "Sb_publishable_uP9HU42MKGX5MZ6LMT_-VQ_8rYtoiC8";
        const PYTHON_API = "https://Vtikeg.pythonanywhere.com/api/upload-from-web";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            if(id === 'homePage') { 
                document.getElementById('navHome').classList.add('active');
                loadAudios(); 
            } else {
                document.getElementById('navUpload').classList.add('active');
            }
        }

        function updateFileName() {
            const file = document.getElementById('audioFile').files[0];
            if(file) {
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('sendBtn').style.display = 'inline-block';
            }
        }

        async function uploadAudio() {
            const file = document.getElementById('audioFile').files[0];
            const status = document.getElementById('status');
            const btn = document.getElementById('sendBtn');
            
            status.innerText = "⏳ جاري الإرسال لتليجرام...";
            btn.disabled = true;

            const fd = new FormData();
            fd.append('video', file); // سنترك الاسم 'video' مؤقتاً ليتوافق مع كود البايثون الحالي أو غيره لـ 'audio'

            try {
                const res = await fetch(PYTHON_API, { method: "POST", body: fd });
                if(res.ok) {
                    status.innerText = "✅ نجح الرفع! سيظهر هنا بمجرد ربط البوت لسوبابيز.";
                    alert("تم الرفع بنجاح");
                    showPage('homePage');
                } else {
                    status.innerText = "❌ فشل السيرفر في الرفع.";
                }
            } catch(e) {
                status.innerText = "❌ تعذر الاتصال بالسيرفر.";
            } finally {
                btn.disabled = false;
            }
        }

        async function loadAudios() {
            const list = document.getElementById('audioList');
            const { data, error } = await supabase.from('vtik_posts').select('*').order('created_at', { ascending: false });
            
            if(data && data.length > 0) {
                list.innerHTML = data.map(a => `
                    <div class="audio-card">
                        <b>👤 ${a.user_name || 'مجهول'}</b>
                        <audio controls>
                            <source src="${a.video_url}" type="audio/mpeg">
                        </audio>
                    </div>
                `).join('');
            } else {
                list.innerHTML = "لا توجد ملفات صوتية حالياً.";
            }
        }

        loadAudios();
    </script>
</body>
</html>
