<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtik | المنصة المتكاملة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #fe2c55; --bg: #000; --overlay: rgba(0,0,0,0.8); }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* شاشة التحميل (Loading Overlay) */
        #loader { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--overlay); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; 
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--main); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* الأقسام الرئيسية */
        .page { display: none; height: 100vh; width: 100%; }
        .active { display: block; }
        
        /* صفحة الفيديوهات */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; }
        .video-card { height: 100vh; scroll-snap-align: start; display: flex; align-items: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* صفحة الرفع */
        .editor-container { padding: 40px 20px; text-align: center; }
        .upload-area { border: 2px dashed #333; padding: 50px; border-radius: 20px; margin-bottom: 20px; }
        .btn { background: var(--main); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; }
        
        /* شريط التنقل */
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #222; display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #888; text-decoration: none; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loadText" style="margin-top: 20px;">جاري إرسال الفيديو لتليجرام...</p>
    </div>

    <div id="home" class="page active">
        <div id="videoFeed" class="feed"></div>
    </div>

    <div id="editor" class="page">
        <div class="editor-container">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <p>اضغط هنا لاختيار فيديو</p>
                <video id="preview" style="display:none; width:100%; border-radius:10px;"></video>
            </div>
            <input type="file" id="fileInput" accept="video/*" hidden onchange="handleSelect(event)">
            <button id="pubBtn" class="btn" style="display:none;" onclick="publish()">نشر الآن على تليجرام 🚀</button>
        </div>
    </div>

    <nav class="nav">
        <a href="#" class="nav-item active" onclick="switchPage('home')">🏠<br>الرئيسية</a>
        <a href="#" class="nav-item" onclick="switchPage('editor')">➕<br>نشر</a>
    </nav>

    <script>
        // الروابط الموحدة
        const SB_URL = "https://etnolailfekdqaatfmmt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bm9sYWlsZmVrZHFhYXRmbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDM0MzIsImV4cCI6MjA5MTgxOTQzMn0.BFC9VsD3AfcMK9gXJKuMhLB8jJVyn14Aa4HF14G8BfY";
        const PYTHON_API = "https://Vtikeg.pythonanywhere.com/api/upload-from-web";

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let videoToUpload = null;

        // تبديل الصفحات
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'home') loadVideos();
        }

        // معاينة الفيديو
        function handleSelect(e) {
            videoToUpload = e.target.files[0];
            if(videoToUpload) {
                document.getElementById('preview').src = URL.createObjectURL(videoToUpload);
                document.getElementById('preview').style.display = 'block';
                document.getElementById('pubBtn').style.display = 'block';
                document.getElementById('dropZone').querySelector('p').style.display = 'none';
            }
        }

        // عملية الرفع (ارسال لبايثون -> تليجرام)
        async function publish() {
            const loader = document.getElementById('loader');
            const session = JSON.parse(localStorage.getItem('vtik_session') || '{}');
            
            loader.style.display = 'flex';
            const fd = new FormData();
            fd.append('video', videoToUpload);
            fd.append('user_id', session.id || 'unknown');
            fd.append('user_name', session.first_name || 'Guest');

            try {
                const res = await fetch(PYTHON_API, { method: 'POST', body: fd });
                if(res.ok) {
                    document.getElementById('loadText').innerText = "✅ وصل لتليجرام! جاري انتظار رد البوت...";
                    // ننتظر قليلاً ثم نعود للرئيسية
                    setTimeout(() => {
                        loader.style.display = 'none';
                        switchPage('home');
                    }, 3000);
                } else {
                    alert("فشل في الوصول للسيرفر");
                    loader.style.display = 'none';
                }
            } catch (err) {
                alert("خطأ في الاتصال");
                loader.style.display = 'none';
            }
        }

        // جلب الفيديوهات للعرض
        async function loadVideos() {
            const { data } = await supabaseClient.from('vtik_posts').select('*').order('created_at', { ascending: false });
            if(data) {
                document.getElementById('videoFeed').innerHTML = data.map(v => `
                    <div class="video-card">
                        <video src="${v.video_url}" loop onclick="this.paused?this.play():this.pause()"></video>
                        <div style="position:absolute; bottom:100px; left:20px;">@${v.user_name}</div>
                    </div>
                `).join('');
            }
        }

        loadVideos();
    </script>
</body>
</html>
